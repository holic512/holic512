# @file update-stats
# @project holic512 profile README
# @module GitHub Actions / README assets
# @description Updates local SVG cards used by the profile README.
# @logic 1. Download verified GitHub profile summary cards; 2. Commit changed SVG assets back to main.
# @dependencies API: github-profile-summary-cards.vercel.app, Assets: assets/*.svg
# @index_tags GitHub Actions, README, SVG stats, profile cards, automation
# @author holic512

name: Update GitHub Stats

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/update-stats.yml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download stats SVGs
        run: |
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=holic512&theme=github" -o assets/profile-details.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=holic512&theme=github" -o assets/github-stats.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=holic512&theme=github" -o assets/top-langs.svg
          curl -fsSL "https://github-profile-summary-cards.vercel.app/api/cards/most-commit-language?username=holic512&theme=github" -o assets/commit-langs.svg

      - name: Commit and push
        run: |
          git add assets/profile-details.svg assets/github-stats.svg assets/top-langs.svg assets/commit-langs.svg
          git diff --staged --quiet || \
            (git -c user.name="github-actions[bot]" \
                 -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                 commit -m "chore: update stats SVGs" && \
             git push)
