    <text x="57" y="363" class="section">ABOUT</text>
    <line x1="57" y1="376" x2="572" y2="376" class="line"/>
    <text x="57" y="410" class="body">I use this profile to track programming practice, project experiments,</text>
    <text x="57" y="433" class="body">and engineering notes. My current public stack centers on web development,</text>
    <text x="57" y="456" class="body">backend fundamentals, automation scripts, and course/project implementations.</text>

    <rect x="609" y="345" width="415" height="174" rx="4" fill="#ffffff" stroke="#d8d8d8"/>
    <line x1="722" y1="345" x2="722" y2="519" class="line"/>
