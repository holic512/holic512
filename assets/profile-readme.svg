<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1480" viewBox="0 0 1080 1480" role="img" aria-labelledby="title desc">
  <title id="title">holic512 GitHub profile overview</title>
  <desc id="desc">A monochrome profile README layout for holic512 with about, tech stack, GitHub activity, engineering notes, and contact cards.</desc>
  <defs>
