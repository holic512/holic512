      .title { font-size: 58px; font-weight: 800; fill: #050505; letter-spacing: -2px; }
      .section { font-size: 18px; font-weight: 800; fill: #111111; }
      .body { font-size: 13px; fill: #111111; }
      .small { font-size: 11px; fill: #333333; }
      .tiny { font-size: 9px; fill: #444444; }
      .label { font-size: 13px; font-weight: 800; fill: #111111; }
      .card { fill: #ffffff; stroke: #dddddd; stroke-width: 1; }
      .line { stroke: #dddddd; stroke-width: 1; }
      .chipText { font-size: 12px; font-weight: 700; fill: #ffffff; }
      .badgeText { font-size: 13px; font-weight: 700; fill: #ffffff; }
      .axis { stroke: #bfbfbf; stroke-width: 1; }
      .grid { stroke: #d8d8d8; stroke-width: 1; stroke-dasharray: 4 5; }
    </style>
  </defs>

