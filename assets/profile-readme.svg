    <line x1="609" y1="461" x2="1024" y2="461" class="line"/>
    <text x="626" y="378" class="label">Focus</text>
    <text x="741" y="372" class="body">Full-stack development, backend services,</text>
    <text x="741" y="395" class="body">automation, and software engineering practice.</text>
    <text x="626" y="436" class="label">Working style</text>
    <text x="741" y="430" class="body">Readable structure, explicit naming, small</text>
    <text x="741" y="453" class="body">iterations, and verifiable results.</text>
    <text x="626" y="494" class="label">Profile theme</text>
    <text x="741" y="488" class="body">Minimal black-and-white layout with</text>
    <text x="741" y="511" class="body">GitHub activity cards.</text>
